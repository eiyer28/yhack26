services:
  - type: web
    name: polygreeks-api
    runtime: python
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: POLYMARKET_API_KEY
        sync: false
      - key: POLYMARKET_SECRET
        sync: false
      - key: POLYMARKET_PASSPHRASE
        sync: false
